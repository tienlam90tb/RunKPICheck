<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dang ky - Running KPI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container { max-width: 440px; width: 100%; }

    .logo { text-align: center; margin-bottom: 24px; }
    .logo .icon { font-size: 48px; }
    .logo h1 { font-size: 22px; margin-top: 8px; }
    .logo p { color: #94a3b8; font-size: 14px; margin-top: 4px; }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .steps { margin-bottom: 20px; }

    .step {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #334155;
    }
    .step:last-child { border-bottom: none; }

    .step-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #334155;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px;
      flex-shrink: 0; color: #38bdf8;
    }

    .step-text { font-size: 14px; color: #94a3b8; line-height: 1.5; }

    label { display: block; color: #94a3b8; font-size: 13px; margin-bottom: 8px; font-weight: 600; }

    input {
      width: 100%; padding: 14px;
      border: 1px solid #334155; border-radius: 12px;
      background: #0f172a; color: #e2e8f0;
      font-size: 15px; font-family: 'Inter', sans-serif;
      margin-bottom: 16px;
    }
    input:focus { outline: none; border-color: #38bdf8; }

    .btn {
      display: block; width: 100%; padding: 16px;
      border: none; border-radius: 12px;
      background: linear-gradient(135deg, #4ade80, #16a34a);
      color: white; font-size: 16px; font-weight: 700;
      cursor: pointer; text-align: center;
    }
    .btn:active { transform: scale(0.98); }

    .alert {
      padding: 12px; border-radius: 10px;
      font-size: 14px; margin-bottom: 16px;
      display: none;
    }

    .back-link {
      display: block; text-align: center;
      color: #38bdf8; text-decoration: none;
      font-size: 14px; margin-top: 16px;
    }

    .member-list { margin-top: 12px; }
    .member-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid #334155;
      font-size: 14px;
    }
    .member-item:last-child { border-bottom: none; }
    .member-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #334155; display: flex;
      align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">
    <div class="icon">&#127939;</div>
    <h1>Dang ky Running KPI</h1>
    <p>Dang ky ten de bat dau theo doi KM chay bo</p>
  </div>

  <div class="card">
    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text">Nhap ten day du cua ban</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text">Bam "Dang ky" ben duoi</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text">Vao tab "Nhap KM" tren trang chu de gui so km moi ngay</div>
      </div>
    </div>

    <div id="alert" class="alert"></div>

    <label>Ten day du cua ban</label>
    <input type="text" id="input-name" placeholder="Vi du: Nguyen Van A" />

    <label>Tao ma PIN (4 so) - dung de xac nhan khi nhap KM</label>
    <input type="password" id="input-pin" placeholder="Vi du: 1234" maxlength="4" inputmode="numeric" pattern="\d{4}" style="letter-spacing:8px; text-align:center;" />

    <button class="btn" onclick="register()">Dang ky</button>
  </div>

  <div class="card">
    <h2 style="font-size:15px;font-weight:600;margin-bottom:12px;">Thanh vien da dang ky</h2>
    <div id="member-list" class="member-list">
      <p style="color:#64748b;font-size:13px;">Dang tai...</p>
    </div>
  </div>

  <a href="/" class="back-link">&#8592; Ve trang chu</a>
</div>

<script>
  const API = window.location.origin;

  function showAlert(text, type) {
    const el = document.getElementById('alert');
    el.style.display = 'block';
    el.style.background = type === 'error' ? '#7f1d1d' : '#166534';
    el.style.color = type === 'error' ? '#f87171' : '#4ade80';
    el.textContent = text;
    if (type !== 'error') setTimeout(() => { el.style.display = 'none'; }, 3000);
  }

  async function register() {
    const name = document.getElementById('input-name').value.trim();
    const pin = document.getElementById('input-pin').value;
    if (!name) { showAlert('Vui long nhap ten cua ban', 'error'); return; }
    if (!pin || !/^\d{4}$/.test(pin)) { showAlert('PIN phai la 4 chu so', 'error'); return; }

    try {
      const res = await fetch(API + '/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, pin })
      });
      const data = await res.json();
      if (data.success) {
        if (data.message) {
          showAlert('Ten nay da duoc dang ky. Ban co the vao Nhap KM luon!', 'success');
        } else {
          showAlert('Dang ky thanh cong! Vao trang chu → Nhap KM de gui so km.', 'success');
        }
        document.getElementById('input-name').value = '';
        loadMembers();
      } else {
        showAlert(data.error || 'Loi dang ky', 'error');
      }
    } catch (err) {
      showAlert('Loi ket noi server', 'error');
    }
  }

  document.getElementById('input-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') register();
  });

  async function loadMembers() {
    try {
      const res = await fetch(API + '/api/employees-list');
      const data = await res.json();
      const list = document.getElementById('member-list');
      if (data.length === 0) {
        list.innerHTML = '<p style="color:#64748b;font-size:13px;">Chua co thanh vien nao</p>';
        return;
      }
      list.innerHTML = '';
      data.forEach(emp => {
        const initial = (emp.name || '?')[0].toUpperCase();
        list.innerHTML += `<div class="member-item">
          <div class="member-avatar">${initial}</div>
          <span>${emp.name}</span>
        </div>`;
      });
    } catch (err) {}
  }

  loadMembers();
</script>
</body>
</html>
